episodesContainer.innerHTML += `

src="${SERIES_THUMBNAIL}"

`;

/* PLAYER */

function startPlayer(){

  document.getElementById("playBtn")
  .style.display = "none";

  const buffer =
  document.getElementById("buffer");

  const bufferText =
  document.getElementById("bufferText");

  buffer.style.display = "flex";

  let percent = 0;

  let loading = setInterval(()=>{

    percent +=
    Math.floor(Math.random()*10)+5;

    if(percent >= 100){

      percent = 100;

      clearInterval(loading);

      bufferText.innerText =
      "โหลดเสร็จสมบูรณ์";

      setTimeout(()=>{

        buffer.style.display = "none";

        document.getElementById("ctaOverlay")
        .style.display = "flex";

      },800);

    }

    bufferText.innerText =
    "กำลังโหลดวิดีโอ... " +
    percent + "%";

  },300);

}

/* EPISODE LINK */
