<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}

/* CONTAINER */
.container{padding:15px;text-align:center}

/* LAYOUT */
.layout{
  display:grid;
  grid-template-columns:1fr minmax(0,1000px) 1fr;
  gap:10px;
}
@media(max-width:1000px){
  .layout{grid-template-columns:1fr}
}

/* SIDE ADS */
.side{display:flex;justify-content:center}
@media(max-width:1000px){.side{display:none}}

/* PLAYER BG */
.player-bg{
  position:relative;
  max-width:1000px;
  margin:auto;
}

.bg-image{
  position:absolute;
  width:100%;
  height:100%;
  background:url('assets/poster.jpg') center/cover no-repeat;
  filter:blur(20px);
  transform:scale(1.2);
  opacity:.5;
  z-index:0;
}

/* PLAYER */
.player{
  position:relative;
  z-index:2;
  width:100%;
  border-radius:12px;
  overflow:hidden;
}

.player::before{
  content:"";
  display:block;
  padding-top:56.25%;
}

.player-content{
  position:absolute;
  width:100%;
  height:100%;
}

.thumbnail{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PLAY */
.play-btn{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:60px;
  background:rgba(0,0,0,.6);
  padding:18px 25px;
  border-radius:50%;
  cursor:pointer;
}

/* BADGE */
.badge{
  position:absolute;
  top:10px;left:10px;
  display:flex;gap:6px;
}
.badge span{
  background:red;
  padding:4px 8px;
  font-size:11px;
  border-radius:4px;
}

/* BUFFER */
.buffering{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.85);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
.spinner{
  border:4px solid #333;
  border-top:4px solid red;
  border-radius:50%;
  width:40px;height:40px;
  animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg)}}

/* CTA */
.cta{margin-top:15px}
.cta button{
  padding:14px 25px;
  background:red;
  border:none;
  color:#fff;
  border-radius:6px;
}

/* EP */
.ep-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
  gap:10px;margin-top:20px;
}
.ep-btn{
  background:#111;padding:12px;border-radius:6px;
  border:1px solid #333;cursor:pointer;
}
.ep-btn:hover{background:red}

/* MOBILE STICKY */
.mobile-ad{
  position:fixed;bottom:0;width:100%;
  display:flex;justify-content:center;background:#000;
}
@media(min-width:768px){.mobile-ad{display:none}}
</style>

<script>
function startPlayer(){
const buffer=document.getElementById("buffer");
const text=document.getElementById("text");
buffer.style.display="flex";

let p=0;
let i=setInterval(()=>{
if(p<50){p+=Math.random()*15;}
else if(p<80){p+=Math.random()*8;}
else if(p<95){p+=Math.random()*3;}
else{p+=Math.random()*1;}

if(p>=100){
clearInterval(i);
text.innerText="กำลังเตรียมวิดีโอ...";
setTimeout(()=>{goLink();},1200);
}else{
text.innerText="กำลังโหลด... "+Math.floor(p)+"%";
}
},300);
}

function goLink(){
window.location.href="https://buffcasualwhine.com/henpkny1f?key=381eaab06b0c4afd4f526aab207f6ca2";
